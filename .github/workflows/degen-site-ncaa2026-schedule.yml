# Runs `degen-site/scripts/updateNcaa2026.sh` on a cron (DynamoDB + ESPN + odds APIs).
# Schedule: every 30 minutes from 8:00 AM through 11:30 PM Pacific, daily.
#
# Required repository secrets (same AWS keys as other workflows):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# Optional:
#   AWS_REGION (defaults to us-east-1 below)
#   ODDS_API_KEY — forwarded as ODDS_API_KEY and REACT_APP_ODDS_API_KEY for NBA/NHL odds
#
# Note: Scheduled workflows use the latest commit on the default branch.
name: NCAA 2026 data update (scheduled)

on:
  schedule:
    - cron: "*/30 8-23 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: degen-site-ncaa2026-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: degen-site

    env:
      TZ: America/Los_Angeles
      # Match your DynamoDB / AWS resources; override if not us-east-1
      AWS_REGION: us-east-1
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      REACT_APP_ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: degen-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run updateNcaa2026.sh (Pacific calendar date)
        run: bash scripts/updateNcaa2026.sh "$(date +%Y-%m-%d)"
