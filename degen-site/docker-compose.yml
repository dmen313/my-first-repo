version: '3.8'

services:
  graphql-server:
    build: .
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - GRAPHQL_PORT=4000
      - REACT_APP_GRAPHQL_ENDPOINT=http://localhost:4000/graphql
      - REACT_APP_ODDS_API_KEY=${REACT_APP_ODDS_API_KEY}
    volumes:
      # Mount data directory for persistence
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

